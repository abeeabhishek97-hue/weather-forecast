stages:
  collect:
    cmd: python src/collect.py
    deps:
      - src/collect.py
      - params.yaml
    outs:
      - data/raw

  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw
      - params.yaml
    outs:
      - data/processed
      - models/technopark_scaler.pkl
      - models/thampanoor_scaler.pkl

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed
      - params.yaml
    outs:
      - models/technopark_model.keras
      - models/thampanoor_model.keras
    metrics:
      - metrics.json
      - version.json
